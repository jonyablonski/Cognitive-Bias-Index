<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#191c17"/>
<meta name="color-scheme" content="light">
<link rel="apple-touch-icon" href="/images/icon-192x192.png">
<link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
<link rel="alternate icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
<link rel="alternate icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
<link rel="mask-icon" href="/images/safari-pinned-tab.svg" color="#191c17">

{{ with .Description }}<meta name="description" content="{{ . }}">{{ end }}

<!-- Block robots from confidential pages -->
{{ if (in .Page.Params.tags "confidential") }}
<meta name="robots" content="noindex">
{{ end }}

<!-- Open Graph / Facebook -->
{{ template "_internal/opengraph.html" . }}

{{ template "_internal/twitter_cards.html" . }}
